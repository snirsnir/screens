<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' https: wss: data:; img-src * data: blob:; media-src * blob:;">
  <title>לוח מנהלה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw; height: 100vh; overflow: hidden;
      font-family: 'Rubik', 'Arial Hebrew', Arial, sans-serif;
    }

    body {
      background: url('../imgs/bg.png') center / cover no-repeat;
      background-color: #ddeeff;
    }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.38);
    }

    /* ── Root ── */
    .root {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh;
      padding: 2.4vh 3.2vw 2vh;
      gap: 0;
    }

    /* ══════════ HEADER ══════════ */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1vh; flex-shrink: 0;
    }

    .hdr-title {
      font-size: 2.3vw; font-weight: 900; letter-spacing: -0.05vw;
      color: #1e3a5f;
    }

    .hdr-center { display: flex; flex-direction: column; align-items: center; gap: 0.1vh; }

    .hdr-clock {
      font-size: 2.1vw; font-weight: 700; color: #1e3a5f;
      font-variant-numeric: tabular-nums; letter-spacing: 0.1vw;
    }
    .hdr-date { font-size: 0.9vw; font-weight: 400; color: #5a7fa8; }

    .hdr-brand {
      font-size: 0.9vw; font-weight: 300; letter-spacing: 0.4vw;
      color: rgba(30,58,95,0.4);
    }

    /* Main separator */
    .hdr-sep {
      height: 0.15vh; margin-bottom: 1vh; flex-shrink: 0; border-radius: 2px;
      background: linear-gradient(90deg,
        transparent,
        rgba(59,130,246,0.6) 20%,
        rgba(139,92,246,0.7) 50%,
        rgba(59,130,246,0.6) 80%,
        transparent);
    }

    /* ══════════ WEEK BLOCK ══════════ */
    .week-block {
      display: flex; flex-direction: column;
      flex: 1; min-height: 0;
      margin-bottom: 1vh;
    }
    .week-block:last-child { margin-bottom: 0; }

    /* Week label row */
    .week-label {
      display: flex; align-items: center; gap: 1vw;
      flex-shrink: 0; margin-bottom: 0.6vh;
    }
    .week-label-text {
      font-size: 0.9vw; font-weight: 700;
      color: #1e3a5f; opacity: 0.6; white-space: nowrap;
    }
    .week-label-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(30,58,95,0.25), transparent);
    }
    .week-label-range {
      font-size: 0.8vw; font-weight: 400;
      color: #5a7fa8; opacity: 0.8;
    }

    /* Mid separator between weeks */
    .week-sep {
      height: 0.1vh; margin: 0.4vh 0; flex-shrink: 0;
      background: rgba(30,58,95,0.15);
    }

    /* ══════════ CALENDAR ROW ══════════ */
    .cal { display: flex; gap: 0.6vw; flex: 1; min-height: 0; }

    /* ══════════ DAY COLUMN ══════════ */
    .day {
      flex: 1; display: flex; flex-direction: column;
      border-radius: 1.2vw; overflow: visible; position: relative;
      background: rgba(255,255,255,0.72);
      border: 0.07vw solid rgba(255,255,255,0.95);
      box-shadow: 0 0.3vh 1.5vw rgba(30,58,95,0.12), inset 0 0.04vh 0 rgba(255,255,255,1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition:
        transform    0.75s cubic-bezier(0.34,1.56,0.64,1),
        background   0.5s ease,
        border-color 0.5s ease,
        box-shadow   0.5s ease;
      transform-origin: bottom center;
    }
    .day-inner {
      display: flex; flex-direction: column; flex: 1;
      border-radius: calc(1.2vw - 0.07vw); overflow: hidden;
    }

    .day.shabbat {
      background: rgba(224,231,255,0.75);
      border-color: rgba(165,180,252,0.7);
    }
    .day.today {
      background: rgba(37,99,235,0.88);
      border-color: rgba(96,165,250,0.9);
      box-shadow: 0 0 3.5vw rgba(37,99,235,0.3), 0 0.3vh 1.5vw rgba(0,0,0,0.12), inset 0 0.04vh 0 rgba(255,255,255,0.4);
    }
    .day.next-week {
      background: rgba(255,255,255,0.52);
      border-color: rgba(255,255,255,0.7);
      opacity: 0.88;
    }
    .day.next-week.shabbat {
      background: rgba(224,231,255,0.55);
    }

    /* Spotlight */
    .day.spotlight {
      transform: scaleY(1.022) scaleX(1.03);
      background: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,1);
      box-shadow: 0 1.2vh 3vw rgba(30,58,95,0.2), 0 0 2.5vw rgba(255,255,255,0.5), inset 0 0.04vh 0 rgba(255,255,255,1);
      z-index: 3;
    }
    .day.today.spotlight {
      background: rgba(37,99,235,0.95);
      border-color: #fff;
      box-shadow: 0 1.2vh 3vw rgba(0,0,0,0.2), 0 0 4vw rgba(59,130,246,0.4), inset 0 0.04vh 0 rgba(255,255,255,0.5);
    }

    /* ══════════ DAY HEADER ══════════ */
    .day-hdr {
      padding: 0.9vh 1vw 0.7vh; text-align: center;
      border-bottom: 0.04vw solid rgba(30,58,95,0.1); flex-shrink: 0;
      position: relative;
      background: rgba(255,255,255,0.35);
    }
    .today .day-hdr {
      border-bottom-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
    }

    .today-badge {
      display: none;
      position: absolute; top: 0.4vh; left: 50%; transform: translateX(-50%);
      background: #fff; color: #1d4ed8;
      font-size: 0.62vw; font-weight: 800;
      padding: 0.2vh 0.9vw; border-radius: 3vw; white-space: nowrap;
      box-shadow: 0 0.15vh 0.8vw rgba(29,78,216,0.35);
    }
    .today .today-badge { display: block; }
    .today .day-hdr     { padding-top: 2.4vh; }

    .day-name {
      font-size: 1.25vw; font-weight: 900; color: #1e3a5f;
      transition: color 0.4s;
    }
    .day-date {
      font-size: 0.9vw; font-weight: 400; margin-top: 0.15vh; color: #7a9abf;
    }
    .today .day-name { color: #fff; font-size: 1.3vw; }
    .today .day-date { color: rgba(255,255,255,0.82); }

    /* Shimmer */
    .today .day-hdr::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(110deg,
        transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
      background-size: 200% 100%;
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ══════════ EVENTS ══════════ */
    .events {
      flex: 1; overflow: hidden; padding: 0.7vh 0.6vw;
      display: flex; flex-direction: column; gap: 0.6vh;
    }

    .ev {
      background: rgba(255,255,255,0.6);
      border: 0.04vw solid rgba(30,58,95,0.1);
      border-radius: 0.65vw; overflow: hidden; flex-shrink: 0;
      box-shadow: 0 0.1vh 0.6vw rgba(30,58,95,0.08);
      transition: background 0.4s;
    }
    .today .ev {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.35);
    }
    .spotlight .ev { background: rgba(255,255,255,0.78); }

    .ev-img   { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .ev-body  { padding: 0.45vh 0.65vw 0.55vh; }
    .ev-title { font-size: 0.82vw; font-weight: 700; color: #1e3a5f; line-height: 1.3; }
    .today .ev-title { color: #fff; }
    .ev-sub   { font-size: 0.7vw; font-weight: 400; color: #5a7fa8; margin-top: 0.25vh; line-height: 1.35; }
    .today .ev-sub { color: rgba(255,255,255,0.8); }

    .no-ev { font-size: 0.75vw; color: rgba(30,58,95,0.2); text-align: center; margin-top: 1.5vh; }
    .today .no-ev { color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
<div class="overlay"></div>
<div class="root">
  <div class="hdr">
    <div class="hdr-title">לוח אירועים דו-שבועי</div>
    <div class="hdr-center">
      <div class="hdr-clock" id="clock">00:00</div>
      <div class="hdr-date"  id="hdr-date"></div>
    </div>
    <div class="hdr-brand">TECHNODA</div>
  </div>
  <div class="hdr-sep"></div>

  <!-- Week 1 -->
  <div class="week-block">
    <div class="week-label">
      <div class="week-label-text">שבוע נוכחי</div>
      <div class="week-label-line"></div>
      <div class="week-label-range" id="range-current"></div>
    </div>
    <div class="cal" id="cal-current"></div>
  </div>

  <div class="week-sep"></div>

  <!-- Week 2 -->
  <div class="week-block">
    <div class="week-label">
      <div class="week-label-text">שבוע הבא</div>
      <div class="week-label-line"></div>
      <div class="week-label-range" id="range-next"></div>
    </div>
    <div class="cal" id="cal-next"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js';

const app = initializeApp({
  apiKey:            'AIzaSyDqZ50JZvva8IJ_OMrEWnY9qdCCTyrT4Oo',
  authDomain:        'screens-6e2be.firebaseapp.com',
  projectId:         'screens-6e2be',
  storageBucket:     'screens-6e2be.firebasestorage.app',
  messagingSenderId: '797589477913',
  appId:             '1:797589477913:web:9969b6514aaca29228e888',
  databaseURL:       'https://screens-6e2be-default-rtdb.europe-west1.firebasedatabase.app',
});
const db = getDatabase(app);

const DAY_NAMES = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

const pad     = n => String(n).padStart(2,'0');
const fmtDate = d => `${pad(d.getDate())}.${pad(d.getMonth()+1)}`;
const dateKey = d => d.toISOString().slice(0,10);

function getWeekStart(offset = 0) {
  const t = new Date(); t.setHours(0,0,0,0);
  const sun = new Date(t);
  sun.setDate(t.getDate() - t.getDay() + offset * 7);
  return Array.from({length:7}, (_, i) => {
    const d = new Date(sun); d.setDate(sun.getDate() + i); return d;
  });
}

const todayKey   = dateKey(new Date());
const weekCurrent = getWeekStart(0);
const weekNext    = getWeekStart(1);

/* ── Header date range ── */
document.getElementById('range-current').textContent =
  `${fmtDate(weekCurrent[0])} – ${fmtDate(weekCurrent[6])}`;
document.getElementById('range-next').textContent =
  `${fmtDate(weekNext[0])} – ${fmtDate(weekNext[6])}.${weekNext[6].getFullYear()}`;
document.getElementById('hdr-date').textContent =
  `${fmtDate(weekCurrent[0])} – ${fmtDate(weekNext[6])}.${weekNext[6].getFullYear()}`;

/* ── Clock ── */
const clockEl = document.getElementById('clock');
function updateClock() {
  const n = new Date();
  clockEl.textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}`;
}
updateClock();
setInterval(updateClock, 10000);

/* ── Build a calendar grid ── */
const allCols = [];

function buildCalendar(days, calId, isNextWeek) {
  const calEl   = document.getElementById(calId);
  const evAreas = {};
  const cols    = [];

  days.forEach((d, i) => {
    const key     = dateKey(d);
    const isToday = key === todayKey;
    const isSat   = i === 6;

    const col = document.createElement('div');
    col.className =
      'day' +
      (isToday    ? ' today'     : '') +
      (isSat      ? ' shabbat'   : '') +
      (isNextWeek ? ' next-week' : '');

    col.innerHTML = `
      <div class="day-inner">
        <div class="day-hdr">
          ${isToday ? '<div class="today-badge">היום</div>' : ''}
          <div class="day-name">${DAY_NAMES[i]}</div>
          <div class="day-date">${fmtDate(d)}</div>
        </div>
        <div class="events" id="ev-${key}"></div>
      </div>`;

    calEl.appendChild(col);
    cols.push(col);
    allCols.push(col);
    evAreas[key] = col.querySelector('.events');

    onValue(ref(db, `management/calendar/${key}`), snap => {
      const area = evAreas[key];
      area.innerHTML = '';
      if (!snap.exists()) { area.innerHTML = '<div class="no-ev">—</div>'; return; }
      Object.values(snap.val())
        .sort((a,b) => (a.order||0) - (b.order||0))
        .forEach(ev => {
          const el = document.createElement('div');
          el.className = 'ev';
          el.innerHTML =
            (ev.imageUrl ? `<img class="ev-img" src="${ev.imageUrl}" onerror="this.style.display='none'">` : '') +
            `<div class="ev-body">` +
            (ev.title    ? `<div class="ev-title">${ev.title}</div>`  : '') +
            (ev.subtitle ? `<div class="ev-sub">${ev.subtitle}</div>` : '') +
            `</div>`;
          area.appendChild(el);
        });
    });
  });

  return cols;
}

buildCalendar(weekCurrent, 'cal-current', false);
buildCalendar(weekNext,    'cal-next',    true);

/* ── Spotlight — cycles through ALL 14 columns ── */
let spotIdx = allCols.findIndex((_, i) => {
  const d = i < 7 ? weekCurrent[i] : weekNext[i - 7];
  return dateKey(d) === todayKey;
});
if (spotIdx < 0) spotIdx = 0;

function nextSpotlight() {
  allCols.forEach(c => c.classList.remove('spotlight'));
  allCols[spotIdx].classList.add('spotlight');
  spotIdx = (spotIdx + 1) % allCols.length;
}
nextSpotlight();
setInterval(nextSpotlight, 3500);

/* ── Reload at midnight ── */
const now      = new Date();
const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
setTimeout(() => location.reload(), midnight - now);
</script>
</body>
</html>
